# render.yaml — déploiement automatique sur Render.com
# Placez ce fichier à la racine du repo

services:
  # ── Backend API ─────────────────────────────────────────────
  - type: web
    name: gestplaintes-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gestplaintes-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://gestplaintes-ui.onrender.com   # à ajuster
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        value: "Gestion Plaintes <noreply@societe.com>"

  # ── Frontend static site ────────────────────────────────────
  - type: web
    name: gestplaintes-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://gestplaintes-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── Base de données PostgreSQL ──────────────────────────────
databases:
  - name: gestplaintes-db
    databaseName: plaintes
    user: plaintes_user
    plan: free
